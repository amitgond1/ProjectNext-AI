services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: project_recommender
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d project_recommender"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/project_recommender
      ALLOWED_ORIGINS: http://localhost:5174,http://127.0.0.1:5174,http://localhost:5173
      MODEL_NAME: sentence-transformers/all-MiniLM-L6-v2
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - model_cache:/root/.cache/huggingface

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  model_cache:
